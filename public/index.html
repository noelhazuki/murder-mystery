<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事件簿 - マダミス管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --desk: #242220;
    --cover: #1B1A18;
    --cover-edge: #322F2C;
    --band: #100F0E;
    --page: #F4EFE3;
    --page-shadow: #E7E0CF;
    --ink: #2A241D;
    --ink-soft: #8C8272;
    --accent: #3B5BA8;
    --accent-deep: #2C4685;
    --tab-off: #E4DDC8;
    --line: #E2DAC2;
    --accent-red: #9C4A3A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: var(--desk);
    background-image: radial-gradient(ellipse at 50% 0%, #2E2B27 0%, var(--desk) 70%);
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink);
    padding: 16px 6px 30px;
  }

  /* ============ 手帳の外枠(表紙+ゴムバンド) ============ */
  .notebook-wrap {
    position: relative;
    max-width: 560px;
    margin: 0 auto;
  }

  .cover-frame {
    background: var(--cover);
    border-radius: 16px;
    padding: 6px 6px 10px;
    box-shadow:
      0 14px 30px rgba(0,0,0,0.45),
      inset 0 0 0 1px var(--cover-edge);
  }

  /* 背表紙(左端のステッチ) */
  .spine {
    position: absolute;
    left: 6px; top: 6px; bottom: 10px;
    width: 10px;
    background: linear-gradient(to right, #0D0C0B, #1B1A18);
    border-radius: 16px 0 0 16px;
    z-index: 2;
  }
  .spine::before {
    content: '';
    position: absolute;
    left: 6px; top: 18px; bottom: 18px;
    width: 0;
    border-left: 1px dashed #4A4741;
  }

  /* ============ 紙面(実際のコンテンツ) ============ */
  .page {
    position: relative;
    background: var(--page);
    border-radius: 8px;
    margin-left: 11px;
    min-height: 640px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
  }

  /* ============ ヘッダー ============ */
  .app-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--line);
    gap: 10px;
  }
  .scenario-title {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.01em;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .scenario-title .label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .switch-btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11.5px;
    color: var(--accent-deep);
    background: none;
    border: 1px solid #C9BFA0;
    border-radius: 20px;
    padding: 6px 13px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ============ メインタブ ============ */
  .main-tabs {
    display: flex;
    padding: 0 16px;
    border-bottom: 1px solid var(--line);
  }
  .main-tab {
    flex: 1;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink-soft);
    background: none;
    border: none;
    padding: 13px 4px 11px;
    position: relative;
  }
  .main-tab.active { color: var(--ink); }
  .main-tab.active::after {
    content: '';
    position: absolute;
    left: 20%; right: 20%; bottom: -1px;
    height: 3px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }

  /* ============ 全体レイアウト ============ */
  .stage { position: relative; display: flex; }
  .view { flex: 1; padding: 18px 16px 24px; display: none; }
  .view.active { display: block; }

  /* ============ 入力タブ ============ */
  .input-page textarea {
    width: 100%;
    min-height: 320px;
    border: none;
    background: transparent;
    background-image: repeating-linear-gradient(
      to bottom, transparent, transparent 26px, var(--line) 27px
    );
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14.5px;
    line-height: 27px;
    color: var(--ink);
    resize: vertical;
    outline: none;
  }
  .input-page textarea::placeholder { color: #B7AD92; }
  .save-btn {
    display: block;
    margin: 16px auto 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    color: #fff;
    background: var(--accent-deep);
    border: none;
    border-radius: 9px;
    padding: 12px 38px;
    box-shadow: 0 3px 8px rgba(44,70,133,0.3);
  }

  /* ============ 時系列ビュー ============ */
  .timeline-controls { display: flex; justify-content: flex-end; margin-bottom: 12px; }
  .order-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent-deep);
    background: none;
    border: 1px solid #C9BFA0;
    border-radius: 14px;
    padding: 5px 12px;
  }
  .memo-card {
    background: #FBF8EE;
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .memo-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .memo-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .memo-star { font-size: 15px; background: none; border: none; color: #D8CEB0; }
  .memo-star.on { color: #B8862F; }
  .memo-body { font-size: 14px; line-height: 1.8; }
  .memo-body a {
    color: var(--accent-deep);
    font-weight: 700;
    text-decoration: none;
    border-bottom: 1.5px solid var(--accent);
  }
  .memo-followup {
    margin-top: 10px;
    padding-top: 10px;
    padding-left: 12px;
    border-top: 1px dashed var(--line);
    border-left: 2px solid var(--line);
    font-size: 13px;
    color: var(--ink-soft);
  }
  .followup-add {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent-deep);
    background: none;
    border: none;
  }
  .followup-input-row {
    margin-top: 8px;
    display: flex;
    gap: 6px;
  }
  .followup-input-row input {
    flex: 1;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12.5px;
    border: 1px solid #C9BFA0;
    border-radius: 6px;
    padding: 6px 8px;
    background: #FFFDF6;
    color: var(--ink);
  }
  .followup-input-row button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #FBF8EE;
    background: var(--accent-deep);
    border: none;
    border-radius: 6px;
    padding: 0 10px;
  }
  .chapter-divider {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    margin: 22px 0 14px;
  }
  .chapter-divider:first-child { margin-top: 0; }

  /* ============ カテゴリ別ビュー + 右タブ ============ */
  .category-stage { display: flex; }
  .category-content { flex: 1; padding-right: 6px; }
  .cat-group-title {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--accent-deep);
    margin: 18px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--line);
  }
  .cat-item {
    background: #FBF8EE;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .cat-item-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .cat-item-related { font-size: 12.5px; color: var(--ink-soft); line-height: 1.7; }

  /* 右端から飛び出す索引タブ */
  .side-tabs {
    display: flex;
    flex-direction: column;
    gap: 9px;
    padding-top: 8px;
    width: 30px;
    margin-right: -22px;
  }
.side-tab {
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: 3px;
    font-size: 11.5px;
    font-weight: 700;
    color: #fff;
    background: var(--accent-deep);
    border: none;
    padding: 12px 5px;
    border-radius: 0 7px 7px 0;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
  }
  .side-tab.tab-red {
    background: var(--accent-red);
  }
  .side-tab.active {
    background: #B9C7E9;
    color: var(--accent-deep);
    padding-right: 9px;
  }
.side-tab.active.tab-red {
    background: #E8C3B7;
    color: var(--accent-red);
}
  /* ============ シナリオ切替モーダル ============ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(16,15,14,0.55);
    z-index: 50;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    width: 100%;
    max-width: 560px;
    background: var(--page);
    border-radius: 18px 18px 0 0;
    padding: 18px 16px 26px;
    max-height: 78vh;
    overflow-y: auto;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.35);
  }
  .modal-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }
  .scenario-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #FBF8EE;
    border-radius: 9px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    padding: 12px 12px;
    margin-bottom: 9px;
  }
  .scenario-row.current {
    box-shadow: inset 0 0 0 1.5px var(--accent-deep), 0 1px 4px rgba(0,0,0,0.06);
  }
  .scenario-select-btn {
    flex: 1;
    text-align: left;
    background: none;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink);
    padding: 2px 0;
  }
  .scenario-current-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent-deep);
    font-weight: 700;
  }
  .scenario-rename-btn {
    flex-shrink: 0;
    font-size: 11px;
    color: var(--ink-soft);
    background: none;
    border: 1px solid #D8CEB0;
    border-radius: 14px;
    padding: 5px 10px;
  }
  .scenario-delete-btn {
    flex-shrink: 0;
    font-size: 11px;
    color: #A23B3B;
    background: none;
    border: 1px solid #E0BDBD;
    border-radius: 14px;
    padding: 5px 10px;
  }
  .modal-new-btn {
    display: block;
    width: 100%;
    margin-top: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    color: #fff;
    background: var(--accent-deep);
    border: none;
    border-radius: 9px;
    padding: 13px;
    box-shadow: 0 3px 8px rgba(44,70,133,0.3);
  }
  .modal-close-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    background: none;
    border: none;
    padding: 8px;
  }
  .modal-empty {
    font-size: 13px;
    color: var(--ink-soft);
    padding: 10px 2px 4px;
  }
  .modal-error {
    font-size: 12.5px;
    color: #A8442E;
    background: #F6E4DE;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<div class="notebook-wrap">
  <div class="cover-frame">
    <div class="spine"></div>
    <div class="page">

      <!-- ============ ヘッダー ============ -->
      <div class="app-header">
        <div class="scenario-title" id="scenario-title">
          <span class="label">CASE FILE</span>
          <span id="scenario-title-text">読み込み中…</span>
        </div>
        <button class="switch-btn" id="switch-open-btn">シナリオ切替</button>
      </div>

      <!-- ============ メインタブ ============ -->
      <div class="main-tabs">
        <button class="main-tab active" data-view="input-view">入力</button>
        <button class="main-tab" data-view="timeline-view">時系列</button>
        <button class="main-tab" data-view="category-view">カテゴリ別</button>
      </div>

      <div class="stage">

        <!-- ============ 入力タブ ============ -->
        <div class="view active input-page" id="input-view">
          <textarea placeholder="気づいたこと、聞いた話、思ったことを自由に書いてください…"></textarea>
          <button class="save-btn">保存する</button>
        </div>

        <!-- ============ 時系列ビュー(API接続) ============ -->
        <div class="view" id="timeline-view">
          <div class="timeline-controls">
            <button class="order-toggle" id="timeline-order-toggle">↓ 新しい順</button>
          </div>

          <div id="timeline-content">
            <div class="modal-empty">読み込み中…</div>
          </div>
        </div>

        <!-- ============ カテゴリ別ビュー(API接続済み) ============ -->
        <div class="view" id="category-view">
          <div class="category-stage">
            <div class="category-content" id="category-content">
              <div class="modal-empty">読み込み中…</div>
            </div>
            <div class="side-tabs">
              <button class="side-tab active" data-category="evidence">証拠</button>
              <button class="side-tab" data-category="person">人物</button>
              <button class="side-tab" data-category="location">場所</button>
              <button class="side-tab tab-red" data-category="reasoning">推理</button>
              <button class="side-tab tab-red" data-category="fact">事実</button>
              <button class="side-tab tab-red" data-category="question">疑問</button>
            </div>
          </div>
        </div>

<!-- ============ シナリオ切替モーダル ============ -->
<div class="modal-overlay" id="switch-modal">
  <div class="modal-sheet">
    <div class="modal-title">SWITCH SCENARIO / シナリオを選ぶ</div>
    <div id="modal-error-slot"></div>
    <div id="scenario-list-slot">
      <div class="modal-empty">読み込み中…</div>
    </div>
    <button class="modal-new-btn" id="modal-new-btn">+ 新規作成</button>
    <button class="modal-close-btn" id="modal-close-btn">閉じる</button>
  </div>
</div>

<script>
  const API_BASE = 'https://murder-mystery.noel-hazuki.workers.dev';

  let scenarios = [];
  let currentScenario = null;

  // ---------- メインタブ切替(既存機能) ----------
  const mainTabs = document.querySelectorAll('.main-tab');
  const views = document.querySelectorAll('.view');

  mainTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      mainTabs.forEach(t => t.classList.remove('active'));
      views.forEach(v => v.classList.remove('active'));
      tab.classList.add('active');
    document.getElementById(tab.dataset.view).classList.add('active');
      localStorage.setItem('lastMainTab', tab.dataset.view);
      if (tab.dataset.view === 'category-view') refreshCategoryView();
      if (tab.dataset.view === 'timeline-view') refreshTimelineView();
    });
  });

  const lastTab = localStorage.getItem('lastMainTab');
  if (lastTab) {
    const target = document.querySelector(`.main-tab[data-view="${lastTab}"]`);
    if (target) target.click();
  }

  // ---------- カテゴリ別ビュー(API接続) ----------
  let entriesCache = [];
  let currentCategory = 'evidence';

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function renderCategoryView() {
    const slot = document.getElementById('category-content');
    const items = entriesCache.filter(e => e.category === currentCategory);
    if (items.length === 0) {
      slot.innerHTML = '<div class="modal-empty">まだ何も登録されていません</div>';
      return;
    }
    slot.innerHTML = items.map(e => `
      <div class="cat-item">
        <div class="cat-item-name">${escapeHtml(e.title)}</div>
        ${e.body ? `<div class="cat-item-related">${escapeHtml(e.body)}</div>` : ''}
      </div>
    `).join('');
  }

  async function refreshCategoryView() {
    if (!currentScenario) return;
    const slot = document.getElementById('category-content');
    slot.innerHTML = '<div class="modal-empty">読み込み中…</div>';
    try {
      const data = await apiGet('/api/entries?scenario_id=' + encodeURIComponent(currentScenario.id));
      entriesCache = extractList(data);
      renderCategoryView();
    } catch (e) {
      slot.innerHTML = '<div class="modal-empty">読み込みに失敗しました</div>';
      console.error(e);
    }
  }

  document.querySelectorAll('.side-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.side-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentCategory = tab.dataset.category;
      renderCategoryView();
    });
  });

  // ---------- 時系列ビュー(API接続) ----------
  let timelineEntries = [];
  let timelineOrder = 'desc'; // desc=新しい順 / asc=古い順

  function formatDateTime(iso) {
    if (!iso) return '';
    // サーバーはUTCで保存しているので、端末のローカル時刻に変換して表示する
    const d = new Date(iso.endsWith('Z') || iso.includes('+') ? iso : iso + 'Z');
    if (isNaN(d.getTime())) return String(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function formatTimeOnly(iso) {
    const full = formatDateTime(iso);
    return full.split(' ')[1] || '';
  }

  function renderTimelineView() {
    const slot = document.getElementById('timeline-content');
    if (timelineEntries.length === 0) {
      slot.innerHTML = '<div class="modal-empty">まだ何も登録されていません</div>';
      return;
    }

    const byId = {};
    timelineEntries.forEach(e => { byId[e.id] = e; });

    const topLevel = timelineEntries.filter(e => !e.parent_id || !byId[e.parent_id]);

    // 子・孫…すべての子孫を時系列順にフラットで集める(封筒→手紙→跡、のような多段入れ子対応)
    const descendantsOf = rootId => {
      const result = [];
      const stack = timelineEntries.filter(e => e.parent_id === rootId);
      while (stack.length) {
        const e = stack.shift();
        result.push(e);
        timelineEntries.filter(c => c.parent_id === e.id).forEach(c => stack.push(c));
      }
      return result.sort((a, b) => (a.updated_at || '').localeCompare(b.updated_at || ''));
    };

    // 章ごとにグループ化
    const chapterMap = new Map();
    topLevel.forEach(e => {
      const ch = e.chapter ?? 0;
      if (!chapterMap.has(ch)) chapterMap.set(ch, []);
      chapterMap.get(ch).push(e);
    });

    let chapters = Array.from(chapterMap.keys()).sort((a, b) => a - b);
    if (timelineOrder === 'desc') chapters = chapters.reverse();

    const html = chapters.map(ch => {
      let items = chapterMap.get(ch).sort((a, b) => (a.updated_at || '').localeCompare(b.updated_at || ''));
      if (timelineOrder === 'desc') items = items.slice().reverse();

      const chapterLabel = ch > 0 ? `┈┈┈┈┈ 第${ch}章 ┈┈┈┈┈` : `┈┈┈┈┈ 章未設定 ┈┈┈┈┈`;

      const cards = items.map(e => {
        const followups = descendantsOf(e.id).map(c => `
          <div class="memo-followup">${formatDateTime(c.updated_at)}追記:${escapeHtml(c.body || c.title)}</div>
        `).join('');

        return `
          <div class="memo-card" data-id="${e.id}">
            <div class="memo-meta">
              <span class="memo-time">${formatDateTime(e.updated_at)}</span>
              <button class="memo-star ${e.starred ? 'on' : ''}" data-id="${e.id}" data-starred="${e.starred ? 1 : 0}">★</button>
            </div>
            <div class="memo-body">
              <strong>${escapeHtml(e.title)}</strong>${e.body ? '　' + escapeHtml(e.body) : ''}
            </div>
            ${followups}
            <button class="followup-add" data-id="${e.id}">+ 追記する</button>
          </div>
        `;
      }).join('');

      return `<div class="chapter-divider">${chapterLabel}</div>${cards}`;
    }).join('');

    slot.innerHTML = html;

    // 星トグル
    slot.querySelectorAll('.memo-star').forEach(btn => {
      btn.addEventListener('click', () => toggleStar(btn.dataset.id, btn.dataset.starred === '1'));
    });

    // 追記ボタン
    slot.querySelectorAll('.followup-add').forEach(btn => {
      btn.addEventListener('click', () => showFollowupInput(btn));
    });
  }

  function showFollowupInput(btn) {
    const id = btn.dataset.id;
    const row = document.createElement('div');
    row.className = 'followup-input-row';
    row.innerHTML = `
      <input type="text" placeholder="追記する内容を入力…">
      <button type="button">追加</button>
    `;
    btn.replaceWith(row);
    const input = row.querySelector('input');
    const saveBtn = row.querySelector('button');
    input.focus();
    saveBtn.addEventListener('click', () => submitFollowup(id, input.value.trim(), row));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitFollowup(id, input.value.trim(), row);
    });
  }

  async function submitFollowup(parentId, text, row) {
    if (!text) return;
    const parent = timelineEntries.find(e => e.id === parentId);
    if (!parent) return;
    row.querySelector('button').disabled = true;
    try {
      await apiPost('/api/entries', {
        entries: [{
          scenario_id: currentScenario.id,
          category: parent.category,
          title: parent.title,
          body: text,
          parent_id: parent.id,
          chapter: parent.chapter ?? null
        }]
      });
      await refreshTimelineView();
    } catch (e) {
      console.error(e);
      row.querySelector('button').disabled = false;
    }
  }

  async function toggleStar(id, currentlyOn) {
    const entry = timelineEntries.find(e => e.id === id);
    if (entry) entry.starred = currentlyOn ? 0 : 1;
    renderTimelineView();
    try {
      await apiPut('/api/entries/' + encodeURIComponent(id), { starred: currentlyOn ? 0 : 1 });
    } catch (e) {
      console.error(e);
      await refreshTimelineView();
    }
  }

  async function refreshTimelineView() {
    if (!currentScenario) return;
    const slot = document.getElementById('timeline-content');
    slot.innerHTML = '<div class="modal-empty">読み込み中…</div>';
    try {
      const data = await apiGet('/api/entries?scenario_id=' + encodeURIComponent(currentScenario.id));
      timelineEntries = extractList(data);
      renderTimelineView();
    } catch (e) {
      slot.innerHTML = '<div class="modal-empty">読み込みに失敗しました</div>';
      console.error(e);
    }
  }

  document.getElementById('timeline-order-toggle').addEventListener('click', (e) => {
    timelineOrder = timelineOrder === 'desc' ? 'asc' : 'desc';
    e.target.textContent = timelineOrder === 'desc' ? '↓ 新しい順' : '↑ 古い順';
    renderTimelineView();
  });

  // ---------- シナリオ管理(API接続) ----------
  function extractList(data) {
    if (Array.isArray(data)) return data;
    if (data && Array.isArray(data.rows)) return data.rows;
    if (data && Array.isArray(data.results)) return data.results;
    if (data && Array.isArray(data.scenarios)) return data.scenarios;
    return [];
  }

  async function apiGet(path) {
    const res = await fetch(API_BASE + path);
    if (!res.ok) throw new Error('取得に失敗しました(' + res.status + ')');
    return res.json();
  }

  async function apiPost(path, body) {
    const res = await fetch(API_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('作成に失敗しました(' + res.status + ')');
    return res.json();
  }

  async function apiPut(path, body) {
    const res = await fetch(API_BASE + path, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('更新に失敗しました(' + res.status + ')');
    return res.json();
  }

  async function apiDelete(path) {
    const res = await fetch(API_BASE + path, { method: 'DELETE' });
    if (!res.ok) throw new Error('削除に失敗しました(' + res.status + ')');
    return res.json();
  }
async function handleSave() {
  const textarea = document.querySelector('.input-page textarea');
  const saveBtn = document.querySelector('.input-page .save-btn');
  const text = textarea.value.trim();
  if (!text || !currentScenario) return;

  saveBtn.disabled = true;
  saveBtn.textContent = '保存中…';
  try {
    await apiPost('/api/classify', { scenario_id: currentScenario.id, text });
    textarea.value = '';
    saveBtn.textContent = '保存しました';
  } catch (e) {
    saveBtn.textContent = '保存に失敗しました';
    console.error(e);
  } finally {
    setTimeout(() => {
      saveBtn.disabled = false;
      saveBtn.textContent = '保存する';
    }, 1500);
  }
}

document.querySelector('.input-page .save-btn').addEventListener('click', handleSave);
  async function loadScenarios() {
    const data = await apiGet('/api/scenarios');
    return extractList(data);
  }

  function nextUntitledName(list) {
    const used = new Set();
    list.forEach(s => {
      const m = /^無題(\d+)$/.exec(s.title || '');
      if (m) used.add(parseInt(m[1], 10));
    });
    let n = 1;
    while (used.has(n)) n++;
    return '無題' + n;
  }

  function setCurrentScenario(scenario) {
    currentScenario = scenario;
    localStorage.setItem('currentScenarioId', scenario.id);
    document.getElementById('scenario-title-text').textContent = scenario.title || '(無題)';
  }

  function showModalError(msg) {
    const slot = document.getElementById('modal-error-slot');
    slot.innerHTML = msg ? `<div class="modal-error">${msg}</div>` : '';
  }

  function renderScenarioList() {
    const slot = document.getElementById('scenario-list-slot');
    if (scenarios.length === 0) {
      slot.innerHTML = '<div class="modal-empty">まだシナリオがありません。「+ 新規作成」から始めてください。</div>';
      return;
    }
    slot.innerHTML = scenarios.map(s => {
      const isCurrent = currentScenario && s.id === currentScenario.id;
      return `
        <div class="scenario-row ${isCurrent ? 'current' : ''}">
          <button class="scenario-select-btn" data-id="${s.id}">${escapeHtml(s.title || '(無題)')}</button>
          ${isCurrent ? '<span class="scenario-current-mark">選択中</span>' : ''}
          <button class="scenario-rename-btn" data-rename="${s.id}">リネーム</button>
          <button class="scenario-delete-btn" data-delete="${s.id}">削除</button>
        </div>
      `;
    }).join('');

    slot.querySelectorAll('.scenario-select-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = scenarios.find(s => s.id === btn.dataset.id);
        if (target) {
          setCurrentScenario(target);
          closeModal();
        }
      });
    });

    slot.querySelectorAll('.scenario-rename-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const target = scenarios.find(s => s.id === btn.dataset.rename);
        if (!target) return;
        const newTitle = window.prompt('新しいシナリオ名を入力してください', target.title || '');
        if (newTitle === null) return; // キャンセル
        const trimmed = newTitle.trim();
        if (!trimmed) {
          showModalError('シナリオ名を空にはできません');
          return;
        }
        btn.disabled = true;
        showModalError('');
        try {
          await apiPut('/api/scenarios/' + encodeURIComponent(target.id), { title: trimmed });
          scenarios = await loadScenarios();
          renderScenarioList();
          if (currentScenario && currentScenario.id === target.id) {
            const updated = scenarios.find(s => s.id === target.id);
            if (updated) setCurrentScenario(updated);
          }
        } catch (e) {
          showModalError(e.message);
        } finally {
          btn.disabled = false;
        }
      });
    });

    slot.querySelectorAll('.scenario-delete-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const target = scenarios.find(s => s.id === btn.dataset.delete);
        if (!target) return;
        const sure = window.confirm(
          '「' + (target.title || '(無題)') + '」を削除します。\n中の証拠・人物・場所などの記録も全て消えます。この操作は元に戻せません。\n本当によろしいですか?'
        );
        if (!sure) return;
        btn.disabled = true;
        showModalError('');
        try {
          await apiDelete('/api/scenarios/' + encodeURIComponent(target.id));
          scenarios = await loadScenarios();

          if (currentScenario && currentScenario.id === target.id) {
            if (scenarios.length > 0) {
              setCurrentScenario(scenarios[0]);
            } else {
              const name = nextUntitledName([]);
              await apiPost('/api/scenarios', { title: name });
              scenarios = await loadScenarios();
              setCurrentScenario(scenarios[0]);
            }
          }
          renderScenarioList();
        } catch (e) {
          showModalError(e.message);
        } finally {
          btn.disabled = false;
        }
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function openModal() {
    document.getElementById('switch-modal').classList.add('open');
    showModalError('');
    refreshScenarioList();
  }

  function closeModal() {
    document.getElementById('switch-modal').classList.remove('open');
  }

  async function refreshScenarioList() {
    try {
      scenarios = await loadScenarios();
      renderScenarioList();
    } catch (e) {
      showModalError(e.message);
    }
  }

  document.getElementById('switch-open-btn').addEventListener('click', openModal);
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('switch-modal').addEventListener('click', (e) => {
    if (e.target.id === 'switch-modal') closeModal();
  });

  document.getElementById('modal-new-btn').addEventListener('click', async () => {
    const btn = document.getElementById('modal-new-btn');
    btn.disabled = true;
    showModalError('');
    try {
      const name = nextUntitledName(scenarios);
      await apiPost('/api/scenarios', { title: name });
      scenarios = await loadScenarios();
      const created = scenarios.find(s => s.title === name) || scenarios[scenarios.length - 1];
      renderScenarioList();
      if (created) {
        setCurrentScenario(created);
        closeModal();
      }
    } catch (e) {
      showModalError(e.message);
    } finally {
      btn.disabled = false;
    }
  });

  // ---------- 初期化 ----------
  async function init() {
    try {
      let list = await loadScenarios();
      const savedId = localStorage.getItem('currentScenarioId');
      let current = list.find(s => s.id === savedId);

      if (!current) {
        if (list.length === 0) {
          const name = nextUntitledName([]);
          await apiPost('/api/scenarios', { title: name });
          list = await loadScenarios();
        }
        current = list[0];
      }

      scenarios = list;
      if (current) {
        setCurrentScenario(current);
      } else {
        document.getElementById('scenario-title-text').textContent = '(シナリオなし)';
      }
    } catch (e) {
      document.getElementById('scenario-title-text').textContent = '読み込みエラー';
      console.error(e);
    }
  }

  init();
</script>
